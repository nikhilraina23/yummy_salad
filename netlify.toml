[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "simple-test.js test-sh.js test-bowl-sizes.js test-admin-frontend.js test-admin.js ADMIN_TESTING_GUIDE.md .env.example"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
